name: Build UtahVidia-Gaming.exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller --onefile --name UtahVidia-Gaming --console --clean ^
            --paths . ^
            --hidden-import utahvidia ^
            --hidden-import utahvidia.gaming_launcher ^
            --hidden-import utahvidia.reality_engine ^
            --hidden-import utahvidia.latency_shield ^
            --hidden-import utahvidia.gaming_profiles ^
            --collect-submodules utahvidia ^
            launchers/UtahVidia-Gaming.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UtahVidia-Gaming-Windows
          path: dist/UtahVidia-Gaming.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/UtahVidia-Gaming.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
